<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luxe Travel Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#1a1a2e;min-height:100vh}
:root{--teal:#2a7f8f;--teal-light:#e8f4f6;--teal-mid:#5aacbc;--gold:#c8a04a;--gold-light:#fdf6e3;--gray:#6b7280;--border:#e2e8f0;--white:#fff;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
.app{max-width:860px;margin:0 auto;padding:2rem 1rem 4rem}
header{text-align:center;margin-bottom:2.5rem}
header h1{font-size:1.75rem;font-weight:600;color:var(--teal);letter-spacing:-.5px}
header p{color:var(--gray);font-size:.9rem;margin-top:.4rem}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:1.75rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
label{display:block;font-size:.82rem;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
input,select{width:100%;padding:.65rem .9rem;border:1px solid var(--border);border-radius:8px;font-size:.95rem;color:#1a1a2e;background:var(--white);outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--teal)}
.full{grid-column:1/-1}
.pax-row{display:flex;align-items:center;gap:.75rem}
.pax-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--teal);font-weight:600;flex-shrink:0}
.pax-btn:hover{background:var(--teal-light)}
#pax-display{font-size:1rem;font-weight:600;min-width:1.5rem;text-align:center}
.btn-primary{width:100%;padding:.85rem;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1.25rem;letter-spacing:.02em;transition:background .2s}
.btn-primary:hover{background:#236e7c}
.btn-primary:disabled{background:#9ca3af;cursor:not-allowed}
#district-row{display:none}
.section-divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0 1rem}
.section-divider span{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal);white-space:nowrap}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.logistics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.9rem}
.l-card{background:#f9fafb;border:1px solid var(--border);border-radius:10px;padding:1rem}
.l-card .l-icon{font-size:1.3rem;margin-bottom:.5rem}
.l-card .l-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);margin-bottom:.25rem}
.l-card .l-val{font-size:.95rem;font-weight:600;color:#1a1a2e;line-height:1.4}
.l-card .l-sub{font-size:.78rem;color:var(--gray);margin-top:.2rem;line-height:1.4}
.reco-grid{display:grid;grid-template-columns:1fr;gap:.85rem}
.reco-item{display:flex;gap:.9rem;align-items:flex-start;padding:.9rem 1rem;background:#fafafa;border:1px solid var(--border);border-radius:10px}
.reco-num{min-width:26px;height:26px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:2px}
.reco-body .reco-name{font-weight:600;font-size:.95rem;margin-bottom:.2rem}
.reco-body .reco-note{font-size:.83rem;color:var(--gray);line-height:1.5}
.timeline-list{list-style:none;position:relative;padding-left:1.5rem}
.timeline-list::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--teal-light)}
.timeline-list li{position:relative;margin-bottom:1rem;padding-left:.75rem}
.timeline-list li::before{content:'';position:absolute;left:-1.1rem;top:5px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid #fff;outline:2px solid var(--teal)}
.tl-time{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-bottom:.15rem}
.tl-title{font-weight:600;font-size:.92rem}
.tl-desc{font-size:.82rem;color:var(--gray);margin-top:.1rem;line-height:1.5}
.checklist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem}
.check-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;background:#f9fafb;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:background .15s;user-select:none}
.check-item:hover{background:var(--teal-light)}
.check-item.done{opacity:.55;text-decoration:line-through}
.check-box{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.check-item.done .check-box{background:var(--teal);border-color:var(--teal);color:#fff;font-size:11px}
.check-label{font-size:.85rem;color:#1a1a2e}
.splitter{background:var(--gold-light);border:1px solid #e8d5a3;border-radius:10px;padding:1.25rem}
.splitter h4{font-size:.85rem;font-weight:700;color:#a07830;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.splitter-row{display:flex;gap:.75rem;align-items:center;margin-bottom:.75rem;flex-wrap:wrap}
.splitter input{flex:1;min-width:120px}
.splitter .result{font-size:1.05rem;font-weight:700;color:#a07830;padding:.6rem .9rem;background:#fff;border:1px solid #e8d5a3;border-radius:8px;min-width:130px;text-align:center}
.advisory{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:1rem 1.25rem}
.advisory p{font-size:.85rem;color:#7a5c00;line-height:1.6}
.dest-header{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.5rem}
.dest-header h2{font-size:1.5rem;font-weight:700;color:var(--teal)}
.dest-header .dates-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--teal-light);color:var(--teal);font-size:.8rem;font-weight:600;padding:.35rem .8rem;border-radius:20px;width:fit-content}
.pax-badge{display:inline-flex;align-items:center;gap:.4rem;background:#f0fdf4;color:#166534;font-size:.8rem;font-weight:600;padding:.35rem .8rem;border-radius:20px}
.loading-state{text-align:center;padding:3rem 1rem;color:var(--gray)}
.loading-state .spinner{width:36px;height:36px;border:3px solid var(--teal-light);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:1rem 1.25rem;color:#dc2626;font-size:.88rem;margin-top:1rem}
#dashboard{display:none}
.tab-bar{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:.45rem 1rem;border:1px solid var(--border);border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;background:#f9fafb;color:var(--gray);transition:all .15s}
.tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>✦ Luxe Travel Planner</h1>
    <p>Curated 5-star intelligence for your journey</p>
  </header>

  <div class="card" id="form-card">
    <div class="form-grid">
      <div class="full">
        <label>Primary Destination</label>
        <input type="text" id="city" placeholder="e.g. Tokyo, Paris, Singapore" oninput="checkDistrict()">
      </div>
      <div class="full" id="district-row">
        <label>District / Town / Suburb <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#9ca3af">(optional)</span></label>
        <input type="text" id="district" placeholder="e.g. Shinjuku, Soho, Marais">
      </div>
      <div>
        <label>Travel From</label>
        <input type="date" id="date-from">
      </div>
      <div>
        <label>Travel To</label>
        <input type="date" id="date-to">
      </div>
      <div>
        <label>Travellers</label>
        <div class="pax-row">
          <button class="pax-btn" onclick="changePax(-1)">−</button>
          <span id="pax-display">2</span>
          <button class="pax-btn" onclick="changePax(1)">+</button>
          <span style="font-size:.85rem;color:var(--gray)">people</span>
        </div>
      </div>
      <div>
        <label>Your Home Timezone</label>
        <select id="home-tz">
          <option value="">— Select —</option>
          <option value="Asia/Singapore">Singapore (SGT, UTC+8)</option>
          <option value="Asia/Kuala_Lumpur">Kuala Lumpur (MYT, UTC+8)</option>
          <option value="Asia/Bangkok">Bangkok (ICT, UTC+7)</option>
          <option value="Asia/Jakarta">Jakarta (WIB, UTC+7)</option>
          <option value="Asia/Manila">Manila (PHT, UTC+8)</option>
          <option value="Asia/Hong_Kong">Hong Kong (HKT, UTC+8)</option>
          <option value="Asia/Shanghai">China (CST, UTC+8)</option>
          <option value="Asia/Tokyo">Tokyo (JST, UTC+9)</option>
          <option value="Asia/Seoul">Seoul (KST, UTC+9)</option>
          <option value="Asia/Kolkata">India (IST, UTC+5:30)</option>
          <option value="Asia/Dubai">Dubai (GST, UTC+4)</option>
          <option value="Europe/London">London (GMT/BST)</option>
          <option value="Europe/Paris">Paris (CET/CEST)</option>
          <option value="America/New_York">New York (ET)</option>
          <option value="America/Los_Angeles">Los Angeles (PT)</option>
          <option value="Australia/Sydney">Sydney (AEST)</option>
        </select>
      </div>
      <div class="full">
        <label>Home Currency</label>
        <select id="home-currency">
          <option value="SGD">SGD – Singapore Dollar</option>
          <option value="MYR">MYR – Malaysian Ringgit</option>
          <option value="USD">USD – US Dollar</option>
          <option value="GBP">GBP – British Pound</option>
          <option value="EUR">EUR – Euro</option>
          <option value="AUD">AUD – Australian Dollar</option>
          <option value="JPY">JPY – Japanese Yen</option>
          <option value="HKD">HKD – Hong Kong Dollar</option>
          <option value="CNY">CNY – Chinese Yuan</option>
          <option value="INR">INR – Indian Rupee</option>
          <option value="IDR">IDR – Indonesian Rupiah</option>
          <option value="THB">THB – Thai Baht</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" id="plan-btn" onclick="planTrip()">Generate My Itinerary ✦</button>
    <div id="form-error" class="error-box" style="display:none"></div>
  </div>

  <div id="loading" style="display:none" class="card loading-state">
    <div class="spinner"></div>
    <p id="loading-msg">Curating your 5-star experience…</p>
  </div>

  <div id="dashboard">
    <div class="card">
      <div class="dest-header">
        <h2 id="dash-title"></h2>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.3rem">
          <span class="dates-badge" id="dash-dates"></span>
          <span class="pax-badge" id="dash-pax"></span>
        </div>
      </div>
      <div class="tab-bar">
        <div class="tab active" onclick="switchTab('logistics')">Logistics</div>
        <div class="tab" onclick="switchTab('stays')">Places to Stay</div>
        <div class="tab" onclick="switchTab('attractions')">Attractions</div>
        <div class="tab" onclick="switchTab('dining')">Dining</div>
        <div class="tab" onclick="switchTab('timeline')">Day Timeline</div>
        <div class="tab" onclick="switchTab('packing')">Packing List</div>
        <div class="tab" onclick="switchTab('commute')">Commute Tips</div>
      </div>

      <div id="tab-logistics" class="tab-content active">
        <div class="logistics-grid" id="logistics-grid"></div>
        <div class="section-divider"><span>Cost splitter</span></div>
        <div class="splitter">
          <h4>Group expense calculator</h4>
          <div class="splitter-row">
            <div style="flex:1;min-width:120px">
              <label style="font-size:.75rem;color:#a07830;margin-bottom:.3rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Total amount</label>
              <input type="number" id="split-amount" placeholder="0.00" oninput="calcSplit()" style="border-color:#e8d5a3">
            </div>
            <div style="flex:1;min-width:120px">
              <label style="font-size:.75rem;color:#a07830;margin-bottom:.3rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Currency</label>
              <select id="split-currency" onchange="calcSplit()" style="border-color:#e8d5a3">
                <option value="dest">Destination currency</option>
                <option value="home">Home currency</option>
              </select>
            </div>
          </div>
          <div id="split-result" class="result">Enter an amount above</div>
        </div>
      </div>

      <div id="tab-stays" class="tab-content">
        <div class="reco-grid" id="stays-grid"></div>
      </div>
      <div id="tab-attractions" class="tab-content">
        <div class="reco-grid" id="attractions-grid"></div>
      </div>
      <div id="tab-dining" class="tab-content">
        <div class="reco-grid" id="dining-grid"></div>
      </div>
      <div id="tab-timeline" class="tab-content">
        <ul class="timeline-list" id="timeline-list"></ul>
      </div>
      <div id="tab-packing" class="tab-content">
        <div class="checklist-grid" id="packing-grid"></div>
      </div>
      <div id="tab-commute" class="tab-content">
        <div class="advisory" id="commute-advisory"></div>
      </div>
    </div>
    <button class="btn-primary" style="max-width:200px;margin:0 auto;display:block;background:#fff;color:var(--teal);border:1px solid var(--teal)" onclick="resetForm()">← Plan Another Trip</button>
  </div>
</div>

<script>
let pax=2, tripData=null, exRate=1;
const largeCities=['tokyo','london','new york','paris','sydney','berlin','bangkok','istanbul','los angeles','chicago','dubai','hong kong','mumbai','delhi','beijing','shanghai','rome','barcelona','amsterdam','seoul','new york city','nyc','kuala lumpur','jakarta','manila','melbourne','osaka','cairo','mexico city','toronto','zurich','vienna'];

function changePax(d){pax=Math.max(1,Math.min(20,pax+d));document.getElementById('pax-display').textContent=pax}

function checkDistrict(){
  const v=document.getElementById('city').value.trim().toLowerCase();
  const show=largeCities.some(c=>v.includes(c)||c.includes(v)&&v.length>3);
  document.getElementById('district-row').style.display=show?'block':'none';
}

function switchTab(name){
  document.querySelectorAll('.tab,.tab-content').forEach(el=>{
    if(el.classList.contains('tab'))el.classList.toggle('active',el.onclick?.toString().includes(name));
    if(el.classList.contains('tab-content'))el.classList.toggle('active',el.id==='tab-'+name);
  });
}

function resetForm(){
  document.getElementById('dashboard').style.display='none';
  document.getElementById('form-card').style.display='block';
}

async function planTrip(){
  const city=document.getElementById('city').value.trim();
  const district=document.getElementById('district').value.trim();
  const from=document.getElementById('date-from').value;
  const to=document.getElementById('date-to').value;
  const tz=document.getElementById('home-tz').value;
  const hcur=document.getElementById('home-currency').value;
  const errEl=document.getElementById('form-error');
  errEl.style.display='none';

  if(!city){errEl.textContent='Please enter a destination city.';errEl.style.display='block';return}
  if(!from||!to){errEl.textContent='Please select your travel dates.';errEl.style.display='block';return}
  if(new Date(to)<new Date(from)){errEl.textContent='End date must be after start date.';errEl.style.display='block';return}
  if(!tz){errEl.textContent='Please select your home timezone.';errEl.style.display='block';return}

  const nights=Math.round((new Date(to)-new Date(from))/(1000*60*60*24));
  const dest=district?`${district}, ${city}`:city;

  document.getElementById('form-card').style.display='none';
  document.getElementById('loading').style.display='block';
  const msgs=['Consulting our 5-star concierge…','Mapping hidden gems & Michelin tables…','Checking weather & logistics…','Curating your bespoke itinerary…'];
  let mi=0;
  const mt=setInterval(()=>{document.getElementById('loading-msg').textContent=msgs[mi=(mi+1)%msgs.length]},2200);

  const prompt=`You are a world-class luxury travel concierge. Generate a comprehensive travel brief for the following trip. Return ONLY valid JSON, no markdown.

Trip details:
- Destination: ${dest}
- Dates: ${from} to ${to} (${nights} nights)
- Travellers: ${pax}
- Home timezone: ${tz}
- Home currency: ${hcur}

Return this exact JSON structure:
{
  "destCurrency": "currency code e.g. JPY",
  "destCurrencyName": "full name e.g. Japanese Yen",
  "destCurrencySymbol": "e.g. ¥",
  "destTimezone": "IANA tz string e.g. Asia/Tokyo",
  "timeDiff": "e.g. +1 hour ahead of your home timezone",
  "weather": "seasonal description with avg temp range and conditions for those exact dates",
  "packingNote": "brief packing advice based on weather",
  "plugType": "e.g. Type A/B (2-3 flat pins)",
  "voltage": "e.g. 100V / 50-60Hz",
  "exchangeRateApprox": number (approximate units of dest currency per 1 unit of home currency),
  "stays": [
    {"name":"Hotel name","note":"What makes it exceptional, location, signature feature"},
    {"name":"Hotel name","note":"..."},
    {"name":"Hotel name","note":"..."}
  ],
  "attractions": [
    {"name":"Place name","note":"Why visit, what to do there, insider tip"},
    ... (5-7 items optimised for ${nights} nights)
  ],
  "dining": [
    {"name":"Restaurant name","note":"Cuisine type, why it's exceptional, Michelin/award info if applicable"},
    ... (5-6 items)
  ],
  "timeline": [
    {"time":"Morning","title":"Activity title","desc":"Brief description with venue name"},
    {"time":"Late Morning","title":"...","desc":"..."},
    {"time":"Lunch","title":"...","desc":"..."},
    {"time":"Afternoon","title":"...","desc":"..."},
    {"time":"Late Afternoon","title":"...","desc":"..."},
    {"time":"Evening","title":"...","desc":"..."},
    {"time":"Night","title":"...","desc":"..."}
  ],
  "packing": ["item1","item2",...] (15-20 destination & date-specific items),
  "commute": "Multi-paragraph commute and transport advisory: how to get around, apps to use, peak hours to avoid, key transit cards, estimated ride costs, tipping norms"
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4096,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    let raw=data.content?.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    // Repair truncated JSON by closing any open structures
    try{ tripData=JSON.parse(raw); }
    catch(e){
      // Attempt to close unterminated JSON gracefully
      const open=(raw.match(/\[/g)||[]).length-(raw.match(/\]/g)||[]).length;
      const openB=(raw.match(/\{/g)||[]).length-(raw.match(/\}/g)||[]).length;
      // Trim to last complete array item
      const lastComma=raw.lastIndexOf(',"');
      if(lastComma>raw.length*0.7) raw=raw.substring(0,lastComma);
      raw+=']'.repeat(Math.max(0,open))+'}' .repeat(Math.max(0,openB));
      tripData=JSON.parse(raw);
    }
    tripData.homeCurrency=hcur;
    tripData.pax=pax;
    tripData.dest=dest;
    tripData.from=from;
    tripData.to=to;
    exRate=tripData.exchangeRateApprox||1;
    clearInterval(mt);
    renderDashboard(tripData);
  }catch(e){
    clearInterval(mt);
    document.getElementById('loading').style.display='none';
    document.getElementById('form-card').style.display='block';
    errEl.textContent='Could not generate itinerary. Please check your connection and try again.';
    errEl.style.display='block';
    console.error(e);
  }
}

function renderDashboard(d){
  document.getElementById('loading').style.display='none';

  const fmt=s=>new Date(s+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('dash-title').textContent='✦ '+d.dest;
  document.getElementById('dash-dates').textContent=`${fmt(d.from)} → ${fmt(d.to)}`;
  document.getElementById('dash-pax').textContent=`${d.pax} traveller${d.pax>1?'s':''}`;

  const lg=document.getElementById('logistics-grid');
  lg.innerHTML=`
    <div class="l-card"><div class="l-icon">🌤</div><div class="l-label">Weather</div><div class="l-val">${d.weather}</div><div class="l-sub">${d.packingNote}</div></div>
    <div class="l-card"><div class="l-icon">🔌</div><div class="l-label">Power / Plug</div><div class="l-val">${d.plugType}</div><div class="l-sub">${d.voltage}</div></div>
    <div class="l-card"><div class="l-icon">🕐</div><div class="l-label">Time Difference</div><div class="l-val">${d.timeDiff}</div><div class="l-sub">vs. your home timezone</div></div>
    <div class="l-card"><div class="l-icon">💱</div><div class="l-label">Currency</div><div class="l-val">${d.destCurrencySymbol} ${d.destCurrencyName}</div><div class="l-sub">~1 ${d.homeCurrency} ≈ ${exRate.toLocaleString(undefined,{maximumFractionDigits:2})} ${d.destCurrency}</div></div>`;

  const mkReco=(items,el)=>{el.innerHTML=items.map((it,i)=>`<div class="reco-item"><div class="reco-num">${i+1}</div><div class="reco-body"><div class="reco-name">${it.name}</div><div class="reco-note">${it.note}</div></div></div>`).join('')};
  mkReco(d.stays,document.getElementById('stays-grid'));
  mkReco(d.attractions,document.getElementById('attractions-grid'));
  mkReco(d.dining,document.getElementById('dining-grid'));

  document.getElementById('timeline-list').innerHTML=d.timeline.map(t=>`<li><div class="tl-time">${t.time}</div><div class="tl-title">${t.title}</div><div class="tl-desc">${t.desc}</div></li>`).join('');

  document.getElementById('packing-grid').innerHTML=d.packing.map((item,i)=>`<div class="check-item" id="ci${i}" onclick="toggleCheck(${i})"><div class="check-box" id="cb${i}"></div><span class="check-label">${item}</span></div>`).join('');

  document.getElementById('commute-advisory').innerHTML=`<p>${d.commute.replace(/\n/g,'</p><p style="margin-top:.6rem">')}</p>`;

  document.getElementById('dashboard').style.display='block';
  switchTab('logistics');
}

function toggleCheck(i){
  const el=document.getElementById('ci'+i),cb=document.getElementById('cb'+i);
  el.classList.toggle('done');
  cb.textContent=el.classList.contains('done')?'✓':'';
}

function calcSplit(){
  if(!tripData)return;
  const amt=parseFloat(document.getElementById('split-amount').value)||0;
  const cur=document.getElementById('split-currency').value;
  const el=document.getElementById('split-result');
  if(!amt){el.textContent='Enter an amount above';return}
  let destAmt,homeAmt;
  if(cur==='dest'){destAmt=amt;homeAmt=amt/exRate}
  else{homeAmt=amt;destAmt=amt*exRate}
  const perDest=(destAmt/pax).toFixed(2);
  const perHome=(homeAmt/pax).toFixed(2);
  el.innerHTML=`Per person: <strong>${tripData.destCurrencySymbol}${parseFloat(perDest).toLocaleString()}</strong> <span style="color:#c8a04a;font-size:.8rem">(${tripData.homeCurrency} ${parseFloat(perHome).toLocaleString()})</span>`;
}
</script>
